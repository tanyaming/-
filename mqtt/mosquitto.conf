# Mosquitto MQTT Broker 配置文件
# 提供给九识的数据接入点

# 监听端口
listener 1883 0.0.0.0

# 协议
protocol mqtt

# 允许匿名（false = 需要用户名密码）
allow_anonymous false

# 密码文件
password_file /mosquitto/config/passwd

# 持久化
persistence true
persistence_location /mosquitto/data/

# 日志
log_dest stdout
log_type all

# 连接限制
max_connections -1
